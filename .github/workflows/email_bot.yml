name: Email WhatsApp Bot

on:
  schedule:
    # Runs every 3 hours (UTC time)
    - cron: '0 */3 * * *'

  # Also lets you trigger it manually from GitHub UI
  workflow_dispatch:

jobs:
  send-email-summary:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run email summarizer
        env:
          GEMINI_API_KEY:           ${{ secrets.GEMINI_API_KEY }}
          GREENAPI_INSTANCE_ID:     ${{ secrets.GREENAPI_INSTANCE_ID }}
          GREENAPI_TOKEN:           ${{ secrets.GREENAPI_TOKEN }}
          GREENAPI_PHONE:           ${{ secrets.GREENAPI_PHONE }}
          GMAIL_TOKEN_JSON:         ${{ secrets.GMAIL_TOKEN_JSON }}
        run: python main.py
